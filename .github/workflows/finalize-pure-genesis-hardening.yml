name: Finalize Pure Genesis Hardening

on:
  push:
    branches: ["agent/pure-genesis-hardening"]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/pure-genesis-hardening
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci --ignore-scripts

      - name: Build and verify final tree
        run: |
          rm .github/workflows/finalize-pure-genesis-hardening.yml
          python tools/generate_draft_manifest.py --write
          npm test

      - name: Commit verified final tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/finalize-pure-genesis-hardening.yml conformance/draft_manifest.json
          git commit -m "Regenerate manifest after pure Genesis hardening"
          git push origin HEAD:agent/pure-genesis-hardening
