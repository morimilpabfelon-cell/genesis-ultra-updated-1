name: Genesis Ultra Conformance

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reference-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore permanent workflow and finalize manifest
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ github.head_ref }}"
          git fetch origin main
          git checkout origin/main -- .github/workflows/conformance.yml
          python tools/generate_draft_manifest.py --write
          if git diff --quiet -- .github/workflows/conformance.yml conformance/draft_manifest.json; then
            echo "Workflow and manifest already final."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/workflows/conformance.yml conformance/draft_manifest.json
            git commit -m "Finalize memory gate bridge manifest"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test
