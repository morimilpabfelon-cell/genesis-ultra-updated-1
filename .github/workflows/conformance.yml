name: Genesis Ultra Conformance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    name: conformance-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            os: ubuntu-24.04
          - platform: windows
            os: windows-2025
          - platform: macos
            os: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test

  # Keep one stable required-check context while every platform remains visible.
  reference-checks:
    name: reference-checks
    if: ${{ always() }}
    needs: conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every platform to pass
        env:
          CONFORMANCE_RESULT: ${{ needs.conformance.result }}
        run: |
          if [ "$CONFORMANCE_RESULT" != "success" ]; then
            echo "One or more conformance platforms did not pass."
            exit 1
          fi
