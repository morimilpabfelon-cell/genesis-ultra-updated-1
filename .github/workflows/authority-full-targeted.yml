name: Refresh Recursive Improvement Negative Fixture

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Refresh negative fixture and manifest
        run: |
          python - <<'PY'
          from copy import deepcopy
          import json
          from pathlib import Path

          cases_path = Path("conformance/schema_invalid_cases.json")
          lab_path = Path("conformance/recursive_improvement_lab_vectors.json")
          document = json.loads(cases_path.read_text(encoding="utf-8"))
          lab = json.loads(lab_path.read_text(encoding="utf-8"))
          case = next(item for item in document["cases"] if item["case_id"] == "recursive-improvement-rejects-extra-field")
          case["artifact"] = deepcopy(lab)
          case["artifact"]["unexpected_core_field"] = True
          cases_path.write_text(json.dumps(document, ensure_ascii=False, indent=2) + "\n", encoding="utf-8", newline="\n")
          PY
          python tools/generate_draft_manifest.py --write
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conformance/schema_invalid_cases.json conformance/draft_manifest.json
          git commit -m "Refresh recursive improvement schema regression"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
