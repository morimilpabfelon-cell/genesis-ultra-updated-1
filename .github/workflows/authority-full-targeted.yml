name: Artifact Error Capture

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  capture:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Capture schema conformance error
        run: |
          set +e
          node tools/validate_artifacts.mjs > artifact-error.log 2>&1
          status=$?
          echo "exit_status=$status" >> artifact-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifact-error.log
          git commit -m "Capture artifact validator error"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
