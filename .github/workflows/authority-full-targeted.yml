name: Artifact Validation Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRANSFER_ARTIFACTS: /tmp/genesis-ultra-transfer-targeted.json
      RECOVERY_ARTIFACTS: /tmp/genesis-ultra-recovery-targeted.json
      JOURNAL_ARTIFACTS: /tmp/genesis-ultra-journal-targeted.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Remove diagnostic workflow from workspace
        run: rm .github/workflows/authority-full-targeted.yml

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Validate schemas without generated artifacts
        run: node tools/validate_artifacts.mjs

      - name: Generate transfer artifact
        run: python tools/simulate_transfer.py --artifacts-output "$TRANSFER_ARTIFACTS"

      - name: Validate transfer artifact
        run: node tools/validate_artifacts.mjs "$TRANSFER_ARTIFACTS"

      - name: Generate recovery artifact
        run: python tools/simulate_backup_recovery.py --source-artifacts "$TRANSFER_ARTIFACTS" --artifacts-output "$RECOVERY_ARTIFACTS"

      - name: Validate transfer and recovery artifacts
        run: node tools/validate_artifacts.mjs "$TRANSFER_ARTIFACTS" "$RECOVERY_ARTIFACTS"

      - name: Generate journal artifact
        run: python tools/simulate_transaction_crashes.py --transfer-artifacts "$TRANSFER_ARTIFACTS" --recovery-artifacts "$RECOVERY_ARTIFACTS" --artifacts-output "$JOURNAL_ARTIFACTS"

      - name: Validate all generated artifacts
        run: node tools/validate_artifacts.mjs "$TRANSFER_ARTIFACTS" "$RECOVERY_ARTIFACTS" "$JOURNAL_ARTIFACTS"
