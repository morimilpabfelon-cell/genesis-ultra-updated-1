name: Prepare Neutral Hybrid Retrieval

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate final vector, schema regression and documentation
        run: |
          python tools/prepare_hybrid_retrieval_vector.py
          python tools/prepare_hybrid_schema_regression.py
          python tools/prepare_hybrid_docs.py

      - name: Remove temporary preparation files
        run: |
          rm tools/prepare_hybrid_retrieval_vector.py
          rm tools/prepare_hybrid_schema_regression.py
          rm tools/prepare_hybrid_docs.py
          rm .github/workflows/prepare-hybrid-retrieval.yml

      - name: Regenerate integrity manifest
        run: python tools/generate_draft_manifest.py --write

      - name: Commit deterministic final state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize neutral hybrid retrieval artifacts"
          git push origin HEAD:${{ github.head_ref }}

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test
