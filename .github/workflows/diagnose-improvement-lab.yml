name: Diagnose Improvement Lab
on:
  push:
    branches: [agent/recursive-improvement-lab]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '20', cache: npm}
      - run: python -m pip install -r requirements.txt
      - run: npm ci
      - id: suite
        continue-on-error: true
        run: |
          npm test > improvement-lab-suite.log 2>&1
          status=$?
          echo "exit_status=$status" >> improvement-lab-suite.log
          cat improvement-lab-suite.log
          exit $status
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: improvement-lab-suite-diagnostic
          path: improvement-lab-suite.log
          retention-days: 1
      - if: steps.suite.outcome == 'failure'
        run: exit 1
