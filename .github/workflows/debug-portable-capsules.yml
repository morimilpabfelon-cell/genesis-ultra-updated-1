name: Debug Portable Capsules

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci --ignore-scripts
      - name: Capture exact results
        shell: bash
        run: |
          set +e
          : > capsule-ci-debug.log
          echo '=== Python capsule validator ===' >> capsule-ci-debug.log
          python tools/validate_portable_memory_capsule.py >> capsule-ci-debug.log 2>&1
          echo "python_exit=$?" >> capsule-ci-debug.log
          echo '=== Node capsule validator ===' >> capsule-ci-debug.log
          node tools/portable_memory_capsule.mjs validate >> capsule-ci-debug.log 2>&1
          echo "node_exit=$?" >> capsule-ci-debug.log
          echo '=== Complete suite ===' >> capsule-ci-debug.log
          npm test >> capsule-ci-debug.log 2>&1
          echo "npm_exit=$?" >> capsule-ci-debug.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add capsule-ci-debug.log
          git commit -m "Capture portable capsule CI diagnostics"
          git push origin HEAD:${{ github.head_ref }}
