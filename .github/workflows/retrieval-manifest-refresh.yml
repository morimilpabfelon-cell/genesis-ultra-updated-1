name: Retrieval Manifest Refresh

on:
  push:
    branches:
      - agent/deterministic-memory-retrieval
    paths-ignore:
      - conformance/draft_manifest.json

permissions:
  contents: write

jobs:
  refresh-manifest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate draft manifest
        run: python tools/generate_draft_manifest.py --write

      - name: Commit manifest when changed
        shell: bash
        run: |
          if git diff --quiet -- conformance/draft_manifest.json; then
            echo "Manifest already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conformance/draft_manifest.json
          git commit -m "Refresh manifest after retrieval verification"
          git push origin HEAD:agent/deterministic-memory-retrieval
