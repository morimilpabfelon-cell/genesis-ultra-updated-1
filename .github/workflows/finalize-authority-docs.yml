name: Finalize Authority Documentation

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Update checklist and manifest
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/V0_1_COMPLETION_CHECKLIST.md")
          text = path.read_text(encoding="utf-8")
          old_registry = """- [x] Registro autocontrolado de ejecución de herramientas con treinta y siete candidatos:
                treinta y tres entrypoints exigidos en el runner y cuatro bibliotecas importadas por
                consumidores alcanzables; cualquier herramienta nueva sin clasificar rompe `npm test`."""
          new_registry = """- [x] Registro autocontrolado de ejecución de herramientas con treinta y nueve candidatos:
                treinta y tres entrypoints exigidos en el runner y seis bibliotecas importadas por
                consumidores alcanzables; cualquier herramienta nueva sin clasificar rompe `npm test`."""
          old_lab = """- [x] Laboratorio de mejora recursiva reproducido por Python y Node: seis candidatos append-only, operadores draft/debug/improve, presupuesto fijo, recibo privado opaco, tres aceptados, un bug y dos rechazos por presupuesto o reward hacking."""
          new_lab = """- [x] Laboratorio de mejora recursiva v0.2 reproducido por Python y Node: seis candidatos
                append-only, grant exacto firmado, binding explícito de instancia/cuerpo/scope/presupuesto,
                apertura sin consumo, solicitud de uso con `grant_ref` firmado, reevaluación contra ledger
                y ocho rechazos adicionales de autoridad, firma, tiempo, presupuesto, suspensión o revocación."""
          pending_anchor = "- [ ] Modelo de amenazas unificado para identidad, memoria, autoridad, herramientas y supply chain."
          pending = """- [ ] Modelo de amenazas unificado para identidad, memoria, autoridad, herramientas y supply chain.
          - [ ] Extraer una API neutral `validateAuthorityBundle` sin semillas ni expectativas TEST ONLY.
          - [ ] Permitir múltiples grants por capacidad con resolución y proyección canónica por `grant_ref`.
          - [ ] Definir y verificar el mapeo candidato→solicitudes firmadas→eventos `grant.consumed`."""
          for old, new, label in [(old_registry, new_registry, "registry"), (old_lab, new_lab, "lab"), (pending_anchor, pending, "pending")]:
              if old not in text:
                  raise SystemExit(f"checklist_anchor_missing:{label}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8", newline="\n")
          PY
          python tools/generate_draft_manifest.py --write
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/V0_1_COMPLETION_CHECKLIST.md conformance/draft_manifest.json
          git commit -m "Document exact-grant laboratory authority"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
