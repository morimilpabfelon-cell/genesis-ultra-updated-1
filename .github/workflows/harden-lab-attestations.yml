name: Harden Laboratory Attestations

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  harden:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Harden, verify, and commit
        run: |
          python tools/_harden_lab_attestations.py
          python tools/generate_draft_manifest.py --write
          python tools/validate_guided_autonomy.py
          node tools/guided_autonomy.mjs validate
          python tools/validate_recursive_improvement_lab.py
          node tools/validate_recursive_improvement_lab.mjs
          python tools/validate_tool_execution_registry.py
          node tools/validate_protocol_vectors.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conformance/recursive_improvement_lab_vectors.json conformance/schema_invalid_cases.json conformance/draft_manifest.json schemas/recursive_improvement_lab.schema.json tools/validate_recursive_improvement_lab.mjs tools/validate_recursive_improvement_lab.py spec/RECURSIVE_IMPROVEMENT_LAB.md docs/V0_1_COMPLETION_CHECKLIST.md
          git commit -m "Add signed evaluator attestations to laboratory"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
