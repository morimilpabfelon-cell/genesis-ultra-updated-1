name: Finalize PR27 Selective Extraction

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Register report, clean checklist, verify, and commit
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required_path = Path("conformance/required_artifacts.json")
          required = json.loads(required_path.read_text(encoding="utf-8"))
          report = "docs/PR27_SELECTIVE_EXTRACTION_REPORT.md"
          if report not in required["required"]:
              required["required"].append(report)
              required["required"].sort(key=lambda value: value.encode("utf-8"))
          required_path.write_text(json.dumps(required, ensure_ascii=False, indent=2) + "\n", encoding="utf-8", newline="\n")

          checklist_path = Path("docs/V0_1_COMPLETION_CHECKLIST.md")
          checklist = checklist_path.read_text(encoding="utf-8")
          stale = [
              "- [ ] Extraer una API neutral `validateAuthorityBundle` sin semillas ni expectativas TEST ONLY.\n",
              "- [ ] Permitir múltiples grants por capacidad con resolución y proyección canónica por `grant_ref`.\n",
              "- [ ] Definir y verificar el mapeo candidato→solicitudes firmadas→eventos `grant.consumed`.\n",
          ]
          for line in stale:
              if line not in checklist:
                  raise SystemExit(f"stale_checklist_line_missing:{line.strip()}")
              checklist = checklist.replace(line, "", 1)
          anchor = "      y catorce rechazos adicionales de autoridad, firma de campaña/evaluador, NFC, entero portable, tiempo, presupuesto, suspensión, revocación, ledger público o mapping de consumo inválido; seis candidatos producen once usos firmados y agotan el grant dedicado.\n"
          completed = "\n- [x] Extracción selectiva de PR #27 documentada y trazable: mecanismos aceptados, reestructurados y rechazados; sin merge directo, cherry-pick masivo ni eliminación de la rama fuente.\n"
          if completed.strip() not in checklist:
              if anchor not in checklist:
                  raise SystemExit("lab_checklist_anchor_missing")
              checklist = checklist.replace(anchor, anchor + completed, 1)
          checklist_path.write_text(checklist, encoding="utf-8", newline="\n")
          PY
          python tools/generate_draft_manifest.py --write
          python tools/validate_workspace.py
          python tools/generate_draft_manifest.py --check
          python tools/validate_tool_execution_registry.py
          python tools/validate_recursive_improvement_lab.py
          node tools/validate_recursive_improvement_lab.mjs
          node tools/validate_protocol_vectors.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conformance/required_artifacts.json conformance/draft_manifest.json docs/V0_1_COMPLETION_CHECKLIST.md
          git commit -m "Finalize PR27 selective extraction record"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
