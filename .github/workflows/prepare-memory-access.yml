name: Prepare Scoped Memory Access

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Prepare final access retrieval state
        id: prepare
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python tools/prepare_memory_access_phase.py > prepare-memory-access.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload preparation diagnostics
        if: steps.prepare.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: prepare-memory-access-log
          path: prepare-memory-access.log
          if-no-files-found: error

      - name: Fail when preparation failed
        if: steps.prepare.outputs.status != '0'
        run: exit 1

      - name: Commit deterministic final state
        shell: bash
        run: |
          set -euo pipefail
          rm -f prepare-memory-access.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No preparation changes."
          else
            git commit -m "Finalize scoped memory access retrieval"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test
