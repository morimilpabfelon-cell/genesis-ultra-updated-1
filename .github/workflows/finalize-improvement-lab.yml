name: Finalize Improvement Lab
on:
  pull_request:
    types: [synchronize, reopened]
permissions:
  contents: write
jobs:
  finalize:
    if: github.head_ref == 'agent/recursive-improvement-lab'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '20', cache: npm}
      - run: python -m pip install -r requirements.txt
      - run: npm ci
      - name: Regenerate clean manifest
        run: |
          rm .github/workflows/finalize-improvement-lab.yml
          python tools/generate_draft_manifest.py --write
          python tools/generate_draft_manifest.py --check
      - name: Commit final tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize recursive improvement laboratory"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Run complete conformance suite
        run: npm test
