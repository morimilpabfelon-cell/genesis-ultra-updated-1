name: Finalize Structured Versioned Memory

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble and prepare final integration
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          cat tools/.structured_versioned_memory_common.part* > tools/structured_versioned_memory_common.py
          cat tools/.structured_versioned_memory_node.part* > tools/structured_versioned_memory.mjs
          cat tools/.generate_structured_memory_vectors.part* > tools/generate_structured_memory_vectors.py
          cat tools/.prepare_structured_memory.part* > tools/prepare_structured_versioned_memory.py
          python tools/generate_structured_memory_vectors.py
          python tools/prepare_structured_versioned_memory.py
          rm tools/.structured_versioned_memory_common.part*
          rm tools/.structured_versioned_memory_node.part*
          rm tools/.generate_structured_memory_vectors.part*
          rm tools/.prepare_structured_memory.part*
          rm tools/generate_structured_memory_vectors.py
          rm tools/prepare_structured_versioned_memory.py
          rm .github/workflows/finalize-structured-versioned-memory.yml
          python tools/generate_draft_manifest.py --write

      - name: Commit final state
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Structured memory state already finalized."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Finalize structured versioned memory"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test
