name: Finalize Guided Autonomy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize-and-test:
    if: github.head_ref == 'agent/guided-autonomy-capability-grants'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install pinned Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci

      - name: Assemble and finalize guided autonomy
        id: finalize
        continue-on-error: true
        run: |
          cat tools/.guided-autonomy-parts/prep-* > tools/prepare_guided_autonomy_phase.py
          python tools/prepare_guided_autonomy_phase.py --pr-number "${{ github.event.pull_request.number }}" > guided-autonomy-finalize.log 2>&1
          status=$?
          cat guided-autonomy-finalize.log
          exit $status

      - name: Upload finalizer diagnostic
        if: always() && steps.finalize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: guided-autonomy-finalizer-diagnostic
          path: guided-autonomy-finalize.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after finalizer failure
        if: steps.finalize.outcome == 'failure'
        run: exit 1

      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Finalize guided autonomy capability grants"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Run complete conformance suite
        run: npm test
