name: Authority Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Capture complete conformance output
        run: |
          set +e
          npm test > authority-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> authority-ci.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add authority-ci.log
          git commit -m "Capture authority conformance diagnostics"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          exit 0
