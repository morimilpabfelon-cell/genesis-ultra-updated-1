name: Finalize Portable Capsules

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Finalize portable capsule evidence
        run: python tools/finalize_portable_capsules.py

      - name: Regenerate integrity manifest
        run: python tools/generate_draft_manifest.py --write

      - name: Commit final state
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Portable capsule state already final."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Finalize portable memory capsule evidence"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --ignore-scripts

      - name: Run complete conformance suite
        run: npm test
