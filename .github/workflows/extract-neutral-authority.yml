name: Capture Neutral Authority Extraction Error

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  capture:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Capture extraction output
        run: |
          set +e
          python tools/_extract_neutral_authority.py > neutral-authority-error.log 2>&1
          status=$?
          echo "exit_status=$status" >> neutral-authority-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add neutral-authority-error.log
          git commit -m "Capture neutral authority extraction error"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
