name: Diagnose Portable Capsules Final

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci --ignore-scripts
      - name: Run clean suite and capture output
        shell: bash
        run: |
          set +e
          rm .github/workflows/diagnose-portable-capsules-final.yml
          npm test > portable-capsule-suite-final.log 2>&1
          status=$?
          echo "suite_exit=$status" >> portable-capsule-suite-final.log
          exit 0
      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: portable-capsule-suite-final-log
          path: portable-capsule-suite-final.log
