name: Cleanup Audit Stale Branch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  cleanup-and-test:
    if: github.head_ref == 'agent/audit-tool-execution-registry'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Delete stale merged preparation branch
        run: |
          if git ls-remote --exit-code --heads origin refs/heads/agent/memory-access-scopes-acl >/dev/null 2>&1; then
            git push origin --delete agent/memory-access-scopes-acl
          fi
          if git ls-remote --exit-code --heads origin refs/heads/agent/memory-access-scopes-acl >/dev/null 2>&1; then
            echo "stale branch still exists" >&2
            exit 1
          fi

      - name: Regenerate manifest and remove temporary workflow
        run: |
          python tools/generate_draft_manifest.py --write
          rm .github/workflows/cleanup_audit_stale_branch.yml

      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Finalize audit tooling cleanup"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Install pinned Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci

      - name: Run complete conformance suite
        run: npm test
