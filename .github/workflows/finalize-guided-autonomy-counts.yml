name: Finalize Guided Autonomy Counts

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize-counts:
    if: github.head_ref == 'agent/guided-autonomy-capability-grants'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Correct final counts and regenerate manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/V0_1_COMPLETION_CHECKLIST.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'Compilación de los 40 JSON Schema': 'Compilación de los 43 JSON Schema',
              'Cuarenta y ocho regresiones': 'Cincuenta y una regresiones',
              'treinta candidatos: veintiséis entrypoints': 'treinta y un candidatos: veintisiete entrypoints',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing checklist text: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/finalize-guided-autonomy-counts.yml').unlink()
          PY
          python tools/generate_draft_manifest.py --write
          python tools/generate_draft_manifest.py --check

      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct guided autonomy conformance counts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Install pinned Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci

      - name: Run complete conformance suite
        run: npm test
