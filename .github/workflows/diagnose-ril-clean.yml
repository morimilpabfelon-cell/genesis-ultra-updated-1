name: Diagnose Clean RIL Tree

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/recursive-improvement-laboratory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Remove diagnostic workflow from tested tree
        run: rm -f .github/workflows/diagnose-ril-clean.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci

      - name: Run suite and capture output
        id: suite
        continue-on-error: true
        run: |
          set +e
          npm test > ril-clean-suite.log 2>&1
          status=$?
          echo "exit_status=$status" >> ril-clean-suite.log
          cat ril-clean-suite.log
          exit $status

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ril-clean-suite-diagnostic
          path: ril-clean-suite.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when suite failed
        if: steps.suite.outcome == 'failure'
        run: exit 1
