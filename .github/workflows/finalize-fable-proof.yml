name: Finalize Fable Operational Proof

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/fable-operational-proof'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: npm ci --ignore-scripts
      - name: Regenerate clean manifest
        run: |
          rm .github/workflows/finalize-fable-proof.yml
          python tools/generate_draft_manifest.py --write
      - name: Commit final tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Fable operational proof artifacts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Run complete conformance suite
        run: npm test
