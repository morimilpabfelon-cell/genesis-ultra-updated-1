name: Verify Guided Autonomy Exact Grants

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Remove temporary migration files from workspace
        run: |
          rm .github/workflows/migrate-guided-autonomy-v02.yml
          rm tools/_migrate_guided_autonomy_v02.py

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Check workspace and manifest
        run: |
          python tools/validate_workspace.py
          python tools/generate_draft_manifest.py --check
          python tools/validate_tool_execution_registry.py

      - name: Check guided autonomy Python
        run: python tools/validate_guided_autonomy.py

      - name: Check guided autonomy Node
        run: node tools/guided_autonomy.mjs validate

      - name: Check laboratory authority Python
        run: python tools/validate_recursive_improvement_lab.py

      - name: Check laboratory authority Node
        run: node tools/validate_recursive_improvement_lab.mjs

      - name: Check schemas and vectors
        run: node tools/validate_protocol_vectors.mjs
