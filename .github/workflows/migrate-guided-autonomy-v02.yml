name: Migrate Guided Autonomy Exact Grants

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Migrate core, vectors, documentation, and manifest
        run: |
          python - <<'PY'
          from copy import deepcopy
          import importlib
          import json
          from pathlib import Path
          import re
          import sys

          def sub_once(text, pattern, replacement, label, flags=0):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"patch_anchor_missing:{label}:{count}")
              return updated

          node_path = Path("tools/guided_autonomy.mjs")
          node = node_path.read_text(encoding="utf-8")
          node = sub_once(node, r'const USE_FIELDS = new Set\(\[.*?\]\);', '''const USE_FIELDS_V1 = new Set(["schema_version", "hash_profile", "use_id", "instance_id", "body_id", "capability", "target_ref", "action_class", "data_class", "requested_actions", "requested_duration_seconds", "requested_bytes", "sandboxed", "human_confirmation_ref", "observer_ref", "reversible_plan_ref", "requested_at", "use_digest", "signature"]);
          const USE_FIELDS_V2 = new Set(["schema_version", "hash_profile", "use_id", "grant_ref", "instance_id", "body_id", "capability", "target_ref", "action_class", "data_class", "requested_actions", "requested_duration_seconds", "requested_bytes", "sandboxed", "human_confirmation_ref", "observer_ref", "reversible_plan_ref", "requested_at", "use_digest", "signature"]);''', "node-use-fields")
          node = sub_once(node, r'export function computeUseDigest\(item\) \{.*?\n\}', '''export function computeUseDigest(item) {
            const v2 = item.schema_version === "genesis.autonomy.capability.use.v0.2";
            const fields = [item.schema_version, item.hash_profile, item.use_id];
            if (v2) fields.push(item.grant_ref);
            fields.push(
              item.instance_id, item.body_id, item.capability, item.target_ref, item.action_class,
              item.data_class, String(item.requested_actions), String(item.requested_duration_seconds),
              String(item.requested_bytes), boolText(item.sandboxed), optionalText(item.human_confirmation_ref),
              optionalText(item.observer_ref), optionalText(item.reversible_plan_ref), item.requested_at,
            );
            return hashFields(v2 ? "genesis.autonomy.capability.use.v0.2" : "genesis.autonomy.capability.use.v0.1", fields);
          }''', "node-compute-use", re.S)
          node = sub_once(node, r'function validateUse\(item, document\) \{.*?\n\}\n\nfunction stateBefore', '''function validateUse(item, document) {
            validateNfc(item);
            const v2 = item.schema_version === "genesis.autonomy.capability.use.v0.2";
            exactFields(item, v2 ? USE_FIELDS_V2 : USE_FIELDS_V1, "use_fields_invalid");
            if (!v2 && item.schema_version !== document.domains.use) fail("use_profile_invalid");
            if (item.hash_profile !== "genesis.hash.fields.v0.1") fail("use_profile_invalid");
            if (v2 && (typeof item.grant_ref !== "string" || item.grant_ref.length === 0)) fail("use_grant_ref_invalid");
            if (item.instance_id !== document.instance_id || !document.registered_body_ids.includes(item.body_id)) fail("use_subject_invalid");
            for (const field of ["target_ref", "action_class", "data_class"]) if (typeof item[field] !== "string" || item[field].length === 0) fail("use_scope_value_invalid");
            for (const field of ["requested_actions", "requested_duration_seconds", "requested_bytes"]) ensureInt(item[field], `use_${field}_invalid`, field === "requested_bytes" ? 0 : 1);
            if (typeof item.sandboxed !== "boolean") fail("use_sandbox_flag_invalid");
            for (const field of ["human_confirmation_ref", "observer_ref", "reversible_plan_ref"]) if (item[field] !== null && (typeof item[field] !== "string" || item[field].length === 0)) fail("use_control_reference_invalid");
            parseUtc(item.requested_at);
            const digest = computeUseDigest(item);
            if (item.use_digest !== digest) fail("use_digest_mismatch");
            validateSignature(item.signature, { digest, domain: v2 ? "genesis.autonomy.capability.use.signature.v0.2" : document.domains.use_signature, key: document.keys.body, signerType: "body", signerId: item.body_id, createdAt: item.requested_at, prefix: "use" });
          }

          function stateBefore''', "node-validate-use", re.S)
          node = sub_once(node, r'export function evaluateUse\(item, grants, events, registered\) \{.*?\n\}\n\nfunction validateLedger', '''export function evaluateUse(item, grants, events, registered) {
            const at = parseUtc(item.requested_at);
            const v2 = item.schema_version === "genesis.autonomy.capability.use.v0.2";
            let reason = "allowed";
            let chosen = null;
            let remaining = null;
            if (FORBIDDEN_CAPABILITIES.has(item.capability)) reason = "capability_forbidden";
            else if (!CAPABILITIES.has(item.capability)) reason = "capability_unknown";
            else {
              const candidates = v2
                ? grants.filter((grant) => grant.grant_id === item.grant_ref)
                : grants.filter((grant) => grant.capability === item.capability);
              if (candidates.length === 0) reason = "grant_missing";
              else if (!v2 && candidates.length > 1) fail("capability_multiple_grants");
              else {
                [chosen] = candidates;
                if (chosen.capability !== item.capability) reason = "grant_capability_mismatch";
                else {
                  const state = stateBefore(chosen, events, at);
                  if (at < parseUtc(chosen.not_before)) reason = "grant_not_yet_valid";
                  else if (chosen.expires_at !== null && at >= parseUtc(chosen.expires_at)) reason = "grant_expired";
                  else if (state.status === "not_issued") reason = "grant_not_issued";
                  else if (state.status === "suspended") reason = "grant_suspended";
                  else if (state.status === "revoked") reason = "grant_revoked";
                  else if (state.status === "exhausted") reason = "grant_exhausted";
                  else if (state.consumed.has(item.use_id)) reason = "use_already_consumed";
                  else if (chosen.body_scope === "specific_bodies" && !chosen.body_ids.includes(item.body_id)) reason = "body_not_authorized";
                  else if (chosen.body_scope === "registered_guardian_devices" && !registered.has(item.body_id)) reason = "body_not_authorized";
                  else if (!chosen.scope.allowed_target_refs.includes(item.target_ref)) reason = "target_not_authorized";
                  else if (!chosen.scope.allowed_action_classes.includes(item.action_class)) reason = "action_not_authorized";
                  else if (!chosen.scope.allowed_data_classes.includes(item.data_class)) reason = "data_class_not_authorized";
                  else if (item.requested_actions > chosen.budget.max_actions_per_run) reason = "action_budget_exceeded";
                  else if (item.requested_duration_seconds > chosen.budget.max_duration_seconds) reason = "duration_budget_exceeded";
                  else if (item.requested_bytes > chosen.budget.max_bytes_per_run) reason = "byte_budget_exceeded";
                  else if (chosen.controls.sandbox_required && !item.sandboxed) reason = "sandbox_required";
                  else if (chosen.controls.human_confirmation_required && item.human_confirmation_ref === null) reason = "human_confirmation_required";
                  else if (chosen.controls.observer_required && item.observer_ref === null) reason = "observer_required";
                  else if (chosen.controls.reversible_required && item.reversible_plan_ref === null) reason = "reversibility_required";
                  if (chosen.use_limit !== null) remaining = Math.max(0, chosen.use_limit - state.consumed.size - (reason === "allowed" ? 1 : 0));
                }
              }
            }
            const status = reason === "allowed" ? "allowed" : "denied";
            const grantRef = chosen === null ? null : chosen.grant_id;
            const decisionDigest = v2
              ? hashFields("genesis.autonomy.capability.use.decision.v0.2", [item.use_id, item.use_digest, item.grant_ref, status, reason, optionalText(remaining)])
              : hashFields("genesis.autonomy.capability.use.decision.v0.1", [item.use_id, item.use_digest, status, reason, optionalText(grantRef), optionalText(remaining)]);
            return { use_id: item.use_id, status, reason, grant_ref: grantRef, remaining_uses: remaining, decision_digest: decisionDigest };
          }

          function validateLedger''', "node-evaluate-use", re.S)
          node = node.replace('for (const grant of [...grants].sort((a, b) => utf8Compare(a.capability, b.capability))) {', 'for (const grant of [...grants].sort((a, b) => utf8Compare(a.capability, b.capability) || utf8Compare(a.grant_id, b.grant_id))) {')
          node = node.replace('  const capabilities = new Set();\n', '')
          node = node.replace('    if (capabilities.has(item.capability)) fail("capability_multiple_grants");\n', '')
          node = node.replace('    capabilities.add(item.capability);\n', '')
          node = node.replace('domain: document.domains.use_signature, createdAt: item.requested_at', 'domain: item.schema_version === "genesis.autonomy.capability.use.v0.2" ? "genesis.autonomy.capability.use.signature.v0.2" : document.domains.use_signature, createdAt: item.requested_at')
          node_path.write_text(node, encoding="utf-8", newline="\n")

          py_path = Path("tools/validate_guided_autonomy.py")
          py = py_path.read_text(encoding="utf-8")
          py = sub_once(py, r'USE_FIELDS = \{.*?\}', '''USE_FIELDS_V1 = {"schema_version", "hash_profile", "use_id", "instance_id", "body_id", "capability", "target_ref", "action_class", "data_class", "requested_actions", "requested_duration_seconds", "requested_bytes", "sandboxed", "human_confirmation_ref", "observer_ref", "reversible_plan_ref", "requested_at", "use_digest", "signature"}
          USE_FIELDS_V2 = {"schema_version", "hash_profile", "use_id", "grant_ref", "instance_id", "body_id", "capability", "target_ref", "action_class", "data_class", "requested_actions", "requested_duration_seconds", "requested_bytes", "sandboxed", "human_confirmation_ref", "observer_ref", "reversible_plan_ref", "requested_at", "use_digest", "signature"}''', "py-use-fields")
          py = sub_once(py, r'def compute_use_digest\(item: dict\) -> str:\n.*?\n\n', '''def compute_use_digest(item: dict) -> str:
              v2 = item["schema_version"] == "genesis.autonomy.capability.use.v0.2"
              fields = [item["schema_version"], item["hash_profile"], item["use_id"]]
              if v2:
                  fields.append(item["grant_ref"])
              fields += [item["instance_id"], item["body_id"], item["capability"], item["target_ref"], item["action_class"], item["data_class"], str(item["requested_actions"]), str(item["requested_duration_seconds"]), str(item["requested_bytes"]), bool_text(item["sandboxed"]), optional_text(item["human_confirmation_ref"]), optional_text(item["observer_ref"]), optional_text(item["reversible_plan_ref"]), item["requested_at"]]
              return hash_fields("genesis.autonomy.capability.use.v0.2" if v2 else "genesis.autonomy.capability.use.v0.1", fields)

          ''', "py-compute-use", re.S)
          py = sub_once(py, r'def validate_use\(item: dict, document: dict\) -> None:\n.*?\n\ndef state_before', '''def validate_use(item: dict, document: dict) -> None:
              validate_nfc(item)
              v2 = item.get("schema_version") == "genesis.autonomy.capability.use.v0.2"
              exact_fields(item, USE_FIELDS_V2 if v2 else USE_FIELDS_V1, "use_fields_invalid")
              if not v2 and item["schema_version"] != document["domains"]["use"]:
                  fail("use_profile_invalid")
              if item["hash_profile"] != "genesis.hash.fields.v0.1":
                  fail("use_profile_invalid")
              if v2 and (not isinstance(item["grant_ref"], str) or not item["grant_ref"]):
                  fail("use_grant_ref_invalid")
              if item["instance_id"] != document["instance_id"] or item["body_id"] not in document["registered_body_ids"]:
                  fail("use_subject_invalid")
              for field in ["target_ref", "action_class", "data_class"]:
                  if not isinstance(item[field], str) or not item[field]:
                      fail("use_scope_value_invalid")
              for field in ["requested_actions", "requested_duration_seconds", "requested_bytes"]:
                  ensure_int(item[field], f"use_{field}_invalid", 0 if field == "requested_bytes" else 1)
              if type(item["sandboxed"]) is not bool:
                  fail("use_sandbox_flag_invalid")
              for field in ["human_confirmation_ref", "observer_ref", "reversible_plan_ref"]:
                  if item[field] is not None and (not isinstance(item[field], str) or not item[field]):
                      fail("use_control_reference_invalid")
              parse_utc(item["requested_at"])
              digest = compute_use_digest(item)
              if item["use_digest"] != digest:
                  fail("use_digest_mismatch")
              validate_signature(item["signature"], digest=digest, domain="genesis.autonomy.capability.use.signature.v0.2" if v2 else document["domains"]["use_signature"], key=document["keys"]["body"], signer_type="body", signer_id=item["body_id"], created_at=item["requested_at"], prefix="use")

          def state_before''', "py-validate-use", re.S)
          py = sub_once(py, r'def evaluate_use\(item: dict, grants: list\[dict\], events: list\[dict\], registered: set\[str\]\) -> dict:\n.*?\n\ndef validate_ledger', '''def evaluate_use(item: dict, grants: list[dict], events: list[dict], registered: set[str]) -> dict:
              at = parse_utc(item["requested_at"])
              v2 = item.get("schema_version") == "genesis.autonomy.capability.use.v0.2"
              reason = "allowed"
              chosen = None
              remaining = None
              if item["capability"] in FORBIDDEN_CAPABILITIES:
                  reason = "capability_forbidden"
              elif item["capability"] not in CAPABILITIES:
                  reason = "capability_unknown"
              else:
                  candidates = [grant for grant in grants if grant["grant_id"] == item["grant_ref"]] if v2 else [grant for grant in grants if grant["capability"] == item["capability"]]
                  if not candidates:
                      reason = "grant_missing"
                  elif not v2 and len(candidates) > 1:
                      fail("capability_multiple_grants")
                  else:
                      chosen = candidates[0]
                      if chosen["capability"] != item["capability"]:
                          reason = "grant_capability_mismatch"
                      else:
                          state = state_before(chosen, events, at)
                          if at < parse_utc(chosen["not_before"]): reason = "grant_not_yet_valid"
                          elif chosen["expires_at"] is not None and at >= parse_utc(chosen["expires_at"]): reason = "grant_expired"
                          elif state["status"] == "not_issued": reason = "grant_not_issued"
                          elif state["status"] == "suspended": reason = "grant_suspended"
                          elif state["status"] == "revoked": reason = "grant_revoked"
                          elif state["status"] == "exhausted": reason = "grant_exhausted"
                          elif item["use_id"] in state["consumed"]: reason = "use_already_consumed"
                          elif chosen["body_scope"] == "specific_bodies" and item["body_id"] not in chosen["body_ids"]: reason = "body_not_authorized"
                          elif chosen["body_scope"] == "registered_guardian_devices" and item["body_id"] not in registered: reason = "body_not_authorized"
                          elif item["target_ref"] not in chosen["scope"]["allowed_target_refs"]: reason = "target_not_authorized"
                          elif item["action_class"] not in chosen["scope"]["allowed_action_classes"]: reason = "action_not_authorized"
                          elif item["data_class"] not in chosen["scope"]["allowed_data_classes"]: reason = "data_class_not_authorized"
                          elif item["requested_actions"] > chosen["budget"]["max_actions_per_run"]: reason = "action_budget_exceeded"
                          elif item["requested_duration_seconds"] > chosen["budget"]["max_duration_seconds"]: reason = "duration_budget_exceeded"
                          elif item["requested_bytes"] > chosen["budget"]["max_bytes_per_run"]: reason = "byte_budget_exceeded"
                          elif chosen["controls"]["sandbox_required"] and not item["sandboxed"]: reason = "sandbox_required"
                          elif chosen["controls"]["human_confirmation_required"] and item["human_confirmation_ref"] is None: reason = "human_confirmation_required"
                          elif chosen["controls"]["observer_required"] and item["observer_ref"] is None: reason = "observer_required"
                          elif chosen["controls"]["reversible_required"] and item["reversible_plan_ref"] is None: reason = "reversibility_required"
                          if chosen["use_limit"] is not None:
                              remaining = max(0, chosen["use_limit"] - len(state["consumed"]) - (1 if reason == "allowed" else 0))
              status = "allowed" if reason == "allowed" else "denied"
              grant_ref = None if chosen is None else chosen["grant_id"]
              digest = hash_fields("genesis.autonomy.capability.use.decision.v0.2", [item["use_id"], item["use_digest"], item["grant_ref"], status, reason, optional_text(remaining)]) if v2 else hash_fields("genesis.autonomy.capability.use.decision.v0.1", [item["use_id"], item["use_digest"], status, reason, optional_text(grant_ref), optional_text(remaining)])
              return {"use_id": item["use_id"], "status": status, "reason": reason, "grant_ref": grant_ref, "remaining_uses": remaining, "decision_digest": digest}

          def validate_ledger''', "py-evaluate-use", re.S)
          py = py.replace('for grant in sorted(grants, key=lambda item: utf8_key(item["capability"])):', 'for grant in sorted(grants, key=lambda item: (utf8_key(item["capability"]), utf8_key(item["grant_id"]))):')
          py = py.replace('    capabilities: set[str] = set()\n', '')
          py = py.replace('        if item["capability"] in capabilities: fail("capability_multiple_grants")\n', '')
          py = py.replace('        grant_ids.add(item["grant_id"]); capabilities.add(item["capability"]); grants.append(item)\n', '        grant_ids.add(item["grant_id"]); grants.append(item)\n')
          py = py.replace('domain=document["domains"]["use_signature"],\n        created_at=item["requested_at"],', 'domain="genesis.autonomy.capability.use.signature.v0.2" if item["schema_version"] == "genesis.autonomy.capability.use.v0.2" else document["domains"]["use_signature"],\n        created_at=item["requested_at"],')
          py_path.write_text(py, encoding="utf-8", newline="\n")

          sys.path.insert(0, str(Path("tools").resolve()))
          ga = importlib.import_module("validate_guided_autonomy")
          vector_path = Path("conformance/guided_autonomy_vectors.json")
          document = json.loads(vector_path.read_text(encoding="utf-8"))
          original_grant = next(item for item in document["grants"] if item["capability"] == "code.execute_sandbox")
          original_proposal = next(item for item in document["proposals"] if item["proposal_id"] == original_grant["proposal_ref"])
          original_evaluation = next(item for item in document["evaluations"] if item["evaluation_id"] == original_grant["evaluation_ref"])

          proposal = deepcopy(original_proposal)
          proposal["proposal_id"] = "proposal_01HAUTONOMY_CODE0002"
          proposal["scope"]["allowed_action_classes"] = ["compile"]
          proposal["budget"] = {"max_actions_per_run": 1, "max_duration_seconds": 60, "max_bytes_per_run": 1000000}
          proposal["reason"] = "Ejecutar compilación aislada mediante un grant paralelo seleccionado explícitamente."
          ga.resign_proposal(document, proposal)

          evaluation = deepcopy(original_evaluation)
          evaluation["evaluation_id"] = "evaluation_01HAUTONOMY_CODE2"
          evaluation["proposal_ref"] = proposal["proposal_id"]
          evaluation["proposal_digest"] = proposal["proposal_digest"]
          evaluation["evaluated_at"] = "2026-07-16T09:02:00Z"
          ga.resign_evaluation(document, evaluation)

          grant = deepcopy(original_grant)
          grant["grant_id"] = "grant_01HAUTONOMY_CODE000002"
          grant["proposal_ref"] = proposal["proposal_id"]
          grant["proposal_digest"] = proposal["proposal_digest"]
          grant["evaluation_ref"] = evaluation["evaluation_id"]
          grant["evaluation_digest"] = evaluation["evaluation_digest"]
          grant["scope"]["allowed_action_classes"] = ["compile"]
          grant["budget"] = deepcopy(proposal["budget"])
          grant["issued_at"] = "2026-07-16T09:11:02Z"
          grant["not_before"] = "2026-07-16T09:11:02Z"
          grant["expires_at"] = "2026-07-17T09:11:02Z"
          grant["use_limit"] = 2
          grant["replaces_grant_ref"] = None
          ga.resign_grant(document, grant)
          document["proposals"].append(proposal)
          document["evaluations"].append(evaluation)
          document["grants"].append(grant)

          issued_template = next(item for item in document["ledger_events"] if item["event_type"] == "grant.issued" and item["grant_ref"] == original_grant["grant_id"])
          issued = deepcopy(issued_template)
          issued["event_id"] = "capevent_01HAUTONOMY_ISSUE03"
          issued["grant_ref"] = grant["grant_id"]
          issued["subject_digest"] = grant["grant_digest"]
          issued["recorded_at"] = "2026-07-16T09:11:03Z"
          document["ledger_events"].append(issued)

          for use in document["use_requests"]:
              if use["capability"] == "code.execute_sandbox":
                  use["schema_version"] = "genesis.autonomy.capability.use.v0.2"
                  use["grant_ref"] = original_grant["grant_id"]
                  ga.resign_use(document, use)

          exact_use = deepcopy(next(item for item in document["use_requests"] if item["use_id"] == "use_01HAUTONOMY_CODE_ALLOW2"))
          exact_use["use_id"] = "use_01HAUTONOMY_CODE_EXACT2"
          exact_use["grant_ref"] = grant["grant_id"]
          exact_use["requested_at"] = "2026-07-16T09:12:00Z"
          exact_use["requested_duration_seconds"] = 30
          exact_use["requested_bytes"] = 50000
          exact_use["human_confirmation_ref"] = "confirm_01HAUTONOMY_EXACT02"
          exact_use["observer_ref"] = "observer_01HAUTONOMY_EXACT02"
          exact_use["reversible_plan_ref"] = "rollback_01HAUTONOMY_EXACT02"
          ga.resign_use(document, exact_use)
          document["use_requests"].append(exact_use)

          document["ledger_events"].sort(key=lambda item: (item["recorded_at"], item["event_id"]))
          for index, event in enumerate(document["ledger_events"]):
              event["sequence"] = index
          ga.rebuild_ledger(document)

          grants = document["grants"]
          events = document["ledger_events"]
          decisions = [ga.evaluate_use(item, grants, events, set(document["registered_body_ids"])) for item in document["use_requests"]]
          projection = ga.build_projection(document, grants, events)
          document["expected"]["projection_digest"] = projection["projection_digest"]
          document["expected"]["decision_digests"] = {item["use_id"]: item["decision_digest"] for item in decisions}
          document["expected"]["allowed_count"] = sum(item["status"] == "allowed" for item in decisions)
          document["expected"]["denied_count"] = sum(item["status"] == "denied" for item in decisions)
          document["must_reject"].append({
              "case_id": "use-v2-grant-ref-digest-bound",
              "mutation": {"target": "use", "index": len(document["use_requests"]) - 1, "path": ["grant_ref"], "value": original_grant["grant_id"]},
              "expected_error": "use_digest_mismatch"
          })
          ga.validate_document(deepcopy(document))
          vector_path.write_text(json.dumps(document, ensure_ascii=False, indent=2) + "\n", encoding="utf-8", newline="\n")

          spec_path = Path("spec/GUIDED_AUTONOMY_AND_CAPABILITY_GRANTS.md")
          spec = spec_path.read_text(encoding="utf-8")
          anchor = "## 11. Proyección de puertas"
          insert = '''## 10.1 Selección exacta y usos v0.2

          El perfil permite varios grants para una misma capacidad. `grant_id` continúa siendo único; la coexistencia de grants con distinto alcance, presupuesto o cuerpo no es un error.

          Una solicitud `genesis.autonomy.capability.use.v0.2` incluye `grant_ref` dentro del digest firmado. La decisión resuelve primero ese ID exacto y luego exige coincidencia de capacidad, instancia, cuerpo, scope, presupuesto y controles. Los usos v0.1 sin `grant_ref` permanecen compatibles únicamente cuando existe un solo grant para su capacidad; si la selección sería ambigua, se rechazan.

          Las proyecciones ordenan puertas por `(capability, grant_id)` en bytes UTF-8.

          '''
          if anchor not in spec:
              raise SystemExit("guided_spec_anchor_missing")
          spec = spec.replace(anchor, insert + anchor, 1)
