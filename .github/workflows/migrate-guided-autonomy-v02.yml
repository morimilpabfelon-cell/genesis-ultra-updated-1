name: Migrate Guided Autonomy Exact Grants

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Migrate core, vectors, documentation, and manifest
        run: |
          python tools/_migrate_guided_autonomy_v02.py
          python tools/generate_draft_manifest.py --write
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/guided_autonomy.mjs tools/validate_guided_autonomy.py conformance/guided_autonomy_vectors.json spec/GUIDED_AUTONOMY_AND_CAPABILITY_GRANTS.md docs/V0_1_COMPLETION_CHECKLIST.md conformance/draft_manifest.json
          git commit -m "Support exact-grant guided autonomy uses v0.2"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
