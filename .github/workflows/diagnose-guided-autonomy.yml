name: Diagnose Guided Autonomy Suite

on:
  push:
    branches:
      - agent/guided-autonomy-capability-grants

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci

      - name: Run suite and capture output
        id: suite
        continue-on-error: true
        run: |
          set +e
          npm test > guided-autonomy-suite.log 2>&1
          status=$?
          echo "exit_status=$status" >> guided-autonomy-suite.log
          cat guided-autonomy-suite.log
          exit $status

      - name: Upload suite diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guided-autonomy-suite-diagnostic
          path: guided-autonomy-suite.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when suite failed
        if: steps.suite.outcome == 'failure'
        run: exit 1
