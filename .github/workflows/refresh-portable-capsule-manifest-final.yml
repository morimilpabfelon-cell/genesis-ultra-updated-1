name: Refresh Portable Capsule Manifest Final

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Remove temporary workflow and regenerate manifest
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/refresh-portable-capsule-manifest-final.yml
          python tools/generate_draft_manifest.py --write
      - name: Commit final state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize portable capsule scalar constraints"
          git push origin HEAD:${{ github.head_ref }}
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci --ignore-scripts
      - name: Run complete conformance suite
        run: npm test
