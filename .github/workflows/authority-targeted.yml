name: Authority Targeted Checks

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --ignore-scripts

      - name: Check draft manifest
        run: python tools/generate_draft_manifest.py --check

      - name: Check tool registry
        run: python tools/validate_tool_execution_registry.py

      - name: Check Python laboratory authority
        run: python tools/validate_recursive_improvement_lab.py

      - name: Check Node laboratory authority
        run: node tools/validate_recursive_improvement_lab.mjs

      - name: Check JSON schemas and vectors
        run: node tools/validate_protocol_vectors.mjs
