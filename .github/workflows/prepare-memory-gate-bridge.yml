name: Prepare Memory Gate Retrieval Bridge

on:
  push:
    branches:
      - agent/memory-gate-retrieval-bridge

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/memory-gate-retrieval-bridge
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prepare repository integration
        run: python tools/prepare_memory_gate_bridge.py
      - name: Regenerate integrity manifest
        run: python tools/generate_draft_manifest.py --write
      - name: Commit deterministic results
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repository changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate memory gate retrieval bridge"
          git push origin HEAD:agent/memory-gate-retrieval-bridge
