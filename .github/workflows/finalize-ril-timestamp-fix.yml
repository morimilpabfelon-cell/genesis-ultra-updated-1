name: Finalize RIL Timestamp Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize-timestamp-fix:
    if: github.head_ref == 'agent/recursive-improvement-laboratory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove temporary workflows
        run: |
          rm -f .github/workflows/diagnose-ril-clean.yml
          rm -f .github/workflows/finalize-ril-timestamp-fix.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Regenerate integrity manifest
        run: |
          python tools/generate_draft_manifest.py --write
          python tools/generate_draft_manifest.py --check

      - name: Commit clean final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Finalize recursive improvement timestamp portability"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci

      - name: Run complete conformance suite
        run: npm test
