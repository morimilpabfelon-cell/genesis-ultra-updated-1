name: Fix Retrieval ACL

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  fix-and-test:
    if: github.head_ref == 'agent/retrieval-scopes-acl'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Align stable rejection category
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('conformance/memory_retrieval_acl_vectors.json')
          s = p.read_text(encoding='utf-8')
          s = s.replace('"case_id":"duplicate_binding","mutation":{"target":"duplicate_binding","index":0},"expected_error":"acl_scope_binding_duplicate"', '"case_id":"duplicate_binding","mutation":{"target":"duplicate_binding","index":0},"expected_error":"acl_scope_binding_coverage_invalid"')
          p.write_text(s, encoding='utf-8')
          PY
          rm .github/workflows/fix-retrieval-acl.yml
          python tools/generate_draft_manifest.py --write
      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align ACL rejection category and manifest"
          git push origin HEAD:${{ github.head_ref }}
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: npm ci --ignore-scripts
      - run: npm test
