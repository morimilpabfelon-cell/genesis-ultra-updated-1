name: Finalize Recursive Improvement

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/recursive-improvement-lab'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: python -m pip install -r requirements.txt
      - run: npm ci
      - name: Finalize inventory and documentation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('.')
          registry=json.loads((root/'conformance/tool_execution_registry.json').read_text())
          registry['entrypoints']=sorted(set(registry['entrypoints'])|{'tools/validate_recursive_improvement_lab.py','tools/validate_recursive_improvement_lab.mjs'})
          (root/'conformance/tool_execution_registry.json').write_text(json.dumps(registry,indent=2,ensure_ascii=False)+'\n')
          inv=json.loads((root/'conformance/required_artifacts.json').read_text())
          add={'spec/RECURSIVE_IMPROVEMENT_LAB.md','schemas/recursive_improvement_lab.schema.json','conformance/recursive_improvement_lab_vectors.json','tools/validate_recursive_improvement_lab.py','tools/validate_recursive_improvement_lab.mjs'}
          inv['required']=sorted(set(inv['required'])|add)
          (root/'conformance/required_artifacts.json').write_text(json.dumps(inv,indent=2,ensure_ascii=False)+'\n')
          cases=json.loads((root/'conformance/schema_invalid_cases.json').read_text())
          cases['cases']=[x for x in cases['cases'] if x.get('case_id')!='recursive-improvement-rejects-extra-field']
          fixture=json.loads((root/'conformance/recursive_improvement_lab_vectors.json').read_text())
          fixture['unexpected_core_field']=True
          cases['cases'].append({'case_id':'recursive-improvement-rejects-extra-field','schema':'recursive_improvement_lab.schema.json','expected_error_keyword':'additionalProperties','artifact':fixture})
          (root/'conformance/schema_invalid_cases.json').write_text(json.dumps(cases,indent=2,ensure_ascii=False)+'\n')
          checklist=root/'docs/V0_1_COMPLETION_CHECKLIST.md'
          text=checklist.read_text()
          evidence=f"- [x] Suite completa verde para el laboratorio de mejora recursiva en el [PR #${{ github.event.pull_request.number }}](https://github.com/morimilpabfelon-cell/genesis-ultra-updated-1/pull/${{ github.event.pull_request.number }})."
          if evidence not in text: text=text.replace('## Implementado y verificado por la suite',evidence+'\n\n## Implementado y verificado por la suite')
          item='- [x] Laboratorio de mejora recursiva reproducido por Python y Node: seis candidatos append-only, operadores draft/debug/improve, presupuesto fijo, recibo privado opaco, tres aceptados, un bug y dos rechazos por presupuesto o reward hacking.'
          if item not in text: text=text.replace('## Pendiente real',item+'\n\n## Pendiente real')
          checklist.write_text(text)
          for p in [root/'.github/workflows/finalize-recursive-improvement.yml']:
              p.unlink(missing_ok=True)
          PY
          python tools/generate_draft_manifest.py --write
          python tools/generate_draft_manifest.py --check
      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize recursive improvement laboratory"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Run complete conformance suite
        run: npm test
