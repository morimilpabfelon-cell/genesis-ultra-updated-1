name: Finalize Recursive Improvement Laboratory

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize-and-test:
    if: github.head_ref == 'agent/recursive-improvement-laboratory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install pinned Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install locked Node dependencies
        run: npm ci

      - name: Finalize recursive improvement laboratory
        run: python tools/.finalize_recursive_improvement.py --pr-number "${{ github.event.pull_request.number }}"

      - name: Commit final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Finalize recursive improvement laboratory"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Run complete conformance suite
        run: npm test
